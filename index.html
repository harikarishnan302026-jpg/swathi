<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

}

/* HERO SECTION */
.hero{
    height:100vh;
    background:url("image/silder.JPG.jfif") center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    background:rgba(0,0,0,0.5);
    padding:40px;
    border-radius:15px;
    text-align:center;
    color:white;
}

.overlay h1{
    font-size:3rem;
}

.overlay p{
    margin:15px 0;
    font-size:1.2rem;
}

.btn{
    display:inline-block;
    padding:12px 25px;
    background:#e91e63;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

/* IMAGE SLIDER */
.slider{
    overflow:hidden;
    width:100%;
    height:500px;
}

.slides{
    display:flex;
    width:300%;
    animation:slide 12s infinite;
}

.slides img{
    width:100%;
    height:500px;
    object-fit:cover;
}

@keyframes slide{
    0%,30%{
        transform:translateX(0);
    }
    35%,65%{
        transform:translateX(-100%);
    }
    70%,100%{
        transform:translateX(-200%);
    }
}

/* SERVICES */
.services{
    padding:60px 20px;
    text-align:center;
}

.services h2{
    margin-bottom:30px;
    color:#e91e63;
    font-size:2rem;
}

.service-container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.card{
    width:300px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h3{
    color:#e91e63;
    padding:15px 0 10px;
}

.card p{
    padding-bottom:20px;
    color:#555;
}

/* CONTACT */

/* FOOTER */
